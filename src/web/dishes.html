<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discover by Dish - Street Food India</title>
  <meta name="description" content="Find the best places to eat your favourite Indian street food dishes — samosa, dosa, biryani and more.">
  <link rel="stylesheet" href="./styles/main.css">
</head>
<body>
  <header class="header">
    <div class="container">
      <a href="/" class="logo">
        <svg class="logo-svg" viewBox="0 0 28 38" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <path d="M14 1C7.925 1 3 5.925 3 12c0 8.5 11 25 11 25S25 20.5 25 12C25 5.925 20.075 1 14 1z" fill="#e65100"/>
          <circle cx="14" cy="11.5" r="7.5" fill="white"/>
          <ellipse cx="14" cy="13.5" rx="4.5" ry="1.8" fill="none" stroke="#e65100" stroke-width="1.3"/>
          <path d="M9.5 13.5 Q9.5 17 14 17 Q18.5 17 18.5 13.5" fill="#ff9800" opacity="0.5"/>
          <path d="M11.5 10.5 Q11 8.5 11.5 7" stroke="#e65100" stroke-width="1.1" stroke-linecap="round" fill="none"/>
          <path d="M14 9.5 Q13.5 7.5 14 6" stroke="#e65100" stroke-width="1.1" stroke-linecap="round" fill="none"/>
          <path d="M16.5 10.5 Q16 8.5 16.5 7" stroke="#e65100" stroke-width="1.1" stroke-linecap="round" fill="none"/>
        </svg>
        <span class="logo-text">Street Food India</span>
      </a>
      <nav class="nav">
        <a href="/" class="nav-link">Home</a>
        <a href="/dishes.html" class="nav-link active">Dishes</a>
        <a href="/#cities" class="nav-link">Cities</a>
        <a href="/personal.html" class="nav-link">My Places</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="dishes-hero">
      <div class="container">
        <h1>Find Your Favourite Dish</h1>
        <p class="hero-subtitle">Browse by dish — see every place that serves it across India</p>
        <div class="dish-search-bar">
          <input
            type="text"
            id="dish-search"
            class="dish-search-input"
            placeholder="Search dishes..."
            autocomplete="off"
          >
        </div>
      </div>
    </section>

    <section class="dishes-gallery-section">
      <div class="container">
        <!-- City-specific dishes (visible once geolocation resolves) -->
        <div id="city-dishes-section" class="hidden">
          <div class="dishes-section-header">
            <h2 class="dishes-section-title" id="city-dishes-title">Popular near you</h2>
          </div>
          <div class="dishes-grid" id="city-dishes-grid"></div>
        </div>

        <!-- Other / all dishes -->
        <div id="other-dishes-header" class="dishes-section-header hidden">
          <h2 class="dishes-section-title">Other Cities</h2>
        </div>
        <div class="dishes-grid" id="dishes-grid"></div>

        <p class="no-results hidden" id="no-dishes">No dishes found matching your search.</p>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <p>&copy; 2024 Street Food India. Made with ❤️ for food lovers.</p>
    </div>
  </footer>

  <script type="module" src="./scripts/dishes.ts"></script>
</body>
</html>
